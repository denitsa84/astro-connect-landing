<!DOCTYPE html>
<html>
<head><title>Convertir OG Image</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;text-align:center;padding:40px">
<h2>OG Image - Astro Connect</h2>
<p>Haz clic en el boton para descargar el og-image.jpg</p>
<canvas id="c" width="1200" height="630" style="border:1px solid #555;max-width:90%;margin:20px auto;display:block"></canvas>
<br>
<button onclick="download()" style="padding:15px 40px;font-size:18px;cursor:pointer;background:#D4A843;border:none;color:#000;border-radius:8px">Descargar og-image.jpg</button>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var img = new Image();
img.onload = function() {
  ctx.drawImage(img, 0, 0, 1200, 630);
};
img.src = 'og-image.svg';

function download() {
  var link = document.createElement('a');
  link.download = 'og-image.jpg';
  link.href = canvas.toDataURL('image/jpeg', 0.95);
  link.click();
}
</script>
</body>
</html>
